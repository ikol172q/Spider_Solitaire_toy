# GitHub Actions workflow: 当推送 tag (v*) 时自动构建 APK 并创建 Release 页面
name: Build APK & Release

on:
  push:
    tags:
      - 'v*'   # 例如 v0.1.0, v1.0.0

permissions:
  contents: write

jobs:
  build:
    # 固定 Ubuntu 22.04 — Ubuntu 24 的 autoconf 与 python-for-android 的 libffi 不兼容
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            zip \
            unzip \
            autoconf \
            automake \
            libtool \
            libtool-bin \
            pkg-config \
            cmake \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            liblzma-dev \
            libsqlite3-dev \
            libreadline-dev \
            ccache \
            lld

      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Cache Buildozer global directory
        uses: actions/cache@v5
        with:
          path: |
            ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK with Buildozer
        run: |
          yes | buildozer android debug 2>&1 | tail -200
        timeout-minutes: 60

      - name: Find APK file
        id: find_apk
        run: |
          APK_PATH=$(find bin -name "*.apk" | head -1)
          APK_NAME=$(basename "$APK_PATH")
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_apk.outputs.apk_path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
